name: Update GitHub Stats SVG

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate stats SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GH_USERNAME: shanujans
          DISPLAY_NAME: "Shanujan Suresh"
          DISPLAY_ROLE: "IT Support Professional"
        run: python today.py

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add light_mode.svg dark_mode.svg
          git diff --staged --quiet || git commit -m "chore: refresh GitHub stats SVG [skip ci]"
          git push
