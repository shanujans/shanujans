<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .titlebar { fill: #f6f8fa; }
    .border { fill: none; stroke: #d0d7de; stroke-width: 1; }
    .dot-r { fill: #ff5f56; }
    .dot-y { fill: #ffbd2e; }
    .dot-g { fill: #27c93f; }
    .title-text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 12px; fill: #57606a; }
    .term { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 14px; }
    .prompt { fill: #1a7f37; }
    .cmd { fill: #24292f; }
    .label { fill: #57606a; }
    .value { fill: #0969da; font-weight: bold; }
    .value-green { fill: #1a7f37; font-weight: bold; }
    .value-red { fill: #cf222e; font-weight: bold; }
    .tree { fill: #8c959f; }
    .comment { fill: #57606a; font-style: italic; }
    .line { opacity: 0; animation: fadeSlide 0.5s ease-out forwards; }
    .l1 { animation-delay: 0.1s; }
    .l2 { animation-delay: 0.35s; }
    .l3 { animation-delay: 0.6s; }
    .l4 { animation-delay: 0.85s; }
    .l5 { animation-delay: 1.1s; }
    .l6 { animation-delay: 1.35s; }
    .l7 { animation-delay: 1.6s; }
    .l8 { animation-delay: 1.85s; }
    .l9 { animation-delay: 2.1s; }
    .l10 { animation-delay: 2.35s; }
    .l11 { animation-delay: 2.6s; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .cursor { fill: #0969da; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>

  <rect class="bg border" x="0.5" y="0.5" width="599" height="399" rx="10" />
  <path class="titlebar border" d="M1,10 a9,9 0 0 1 9,-9 h580 a9,9 0 0 1 9,9 v22 h-598 z" />
  <circle class="dot-r" cx="21" cy="16" r="6" />
  <circle class="dot-y" cx="41" cy="16" r="6" />
  <circle class="dot-g" cx="61" cy="16" r="6" />
  <text x="300" y="20" text-anchor="middle" class="title-text">shanujans@github: ~</text>

  <g class="term">
    <text class="line l1" y="60"><tspan x="24" class="prompt">&#10095;</tspan><tspan x="42" class="cmd">whoami</tspan></text>
    <text class="line l2" y="84"><tspan x="24" class="cmd">Shanujan Suresh &#8212; IT Support Professional</tspan></text>

    <text class="line l3" y="118"><tspan x="24" class="prompt">&#10095;</tspan><tspan x="42" class="cmd">./github-stats.sh --user shanujans</tspan></text>

    <text class="line l4" y="148"><tspan x="24" class="tree">&#9500;&#9472;</tspan><tspan x="46" class="label">GitHub age</tspan><tspan x="220" class="value">calculating…</tspan></text>
    <text class="line l5" y="172"><tspan x="24" class="tree">&#9500;&#9472;</tspan><tspan x="46" class="label">Repositories</tspan><tspan x="220" class="value">—</tspan></text>
    <text class="line l6" y="196"><tspan x="24" class="tree">&#9500;&#9472;</tspan><tspan x="46" class="label">Contributed to</tspan><tspan x="220" class="value">—</tspan></text>
    <text class="line l7" y="220"><tspan x="24" class="tree">&#9500;&#9472;</tspan><tspan x="46" class="label">Total commits</tspan><tspan x="220" class="value">—</tspan></text>
    <text class="line l8" y="244"><tspan x="24" class="tree">&#9500;&#9472;</tspan><tspan x="46" class="label">Stars earned</tspan><tspan x="220" class="value">—</tspan></text>
    <text class="line l9" y="268"><tspan x="24" class="tree">&#9500;&#9472;</tspan><tspan x="46" class="label">Followers</tspan><tspan x="220" class="value">—</tspan></text>
    <text class="line l10" y="292"><tspan x="24" class="tree">&#9500;&#9472;</tspan><tspan x="46" class="label">Lines added</tspan><tspan x="220" class="value-green">+—</tspan></text>
    <text class="line l11" y="316"><tspan x="24" class="tree">&#9492;&#9472;</tspan><tspan x="46" class="label">Lines removed</tspan><tspan x="220" class="value-red">-—</tspan></text>

    <text class="line l11 comment" x="24" y="350">// last synced pending first Action run</text>
    <text class="line l11" y="374"><tspan x="24" class="prompt">&#10095;</tspan><tspan x="42" class="cursor cmd">&#9615;</tspan></text>
  </g>
</svg>
